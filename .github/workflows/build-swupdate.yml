name: Build SWUpdate Buildroot Image

on:
  push:
    branches:
      - main
    paths:
      - 'swupdate/**'
      - '.github/workflows/build-swupdate.yml'
  workflow_dispatch:
    inputs:
      buildroot_version:
        description: 'Buildroot version to use'
        required: false
        default: '2021.05.1'

env:
  BUILDROOT_VERSION: 2021.05.1
  KERNEL_VERSION: 5.14
  ARCH: arm
  CROSS_COMPILE: arm-linux-gnueabihf-

jobs:
  build_buildroot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    outputs:
      cache_key: ${{ steps.buildroot-cache-key.outputs.cache_key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses-dev \
            pkg-config \
            bc \
            git \
            wget \
            cpio \
            unzip \
            rsync \
            curl \
            libssl-dev \
            bison \
            flex \
            u-boot-tools \
            device-tree-compiler \
            gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf

      - name: Create temporary build directory
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/tmp

      - name: Generate Buildroot cache key
        id: buildroot-cache-key
        run: |
          CONFIG_HASH=$(sha256sum ${GITHUB_WORKSPACE}/swupdate/buildroot.config | cut -d' ' -f1)
          echo "cache_key=buildroot-${{ env.BUILDROOT_VERSION }}-${CONFIG_HASH:0:8}" >> $GITHUB_OUTPUT

      - name: Restore Buildroot cache
        uses: actions/cache@v4
        id: buildroot-cache
        with:
          path: ${GITHUB_WORKSPACE}/tmp/buildroot-build
          key: ${{ steps.buildroot-cache-key.outputs.cache_key }}
          restore-keys: |
            buildroot-${{ env.BUILDROOT_VERSION }}-

      - name: Download and extract Buildroot
        if: steps.buildroot-cache.outputs.cache-hit != 'true'
        run: |
          cd ${GITHUB_WORKSPACE}/tmp
          wget https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.gz
          tar -xzf buildroot-${BUILDROOT_VERSION}.tar.gz
          mkdir -p buildroot-build
          mv buildroot-${BUILDROOT_VERSION}/* buildroot-build/
          rm -rf buildroot-${BUILDROOT_VERSION} buildroot-${BUILDROOT_VERSION}.tar.gz

      - name: Configure Buildroot
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/tmp/buildroot-build
          cd ${GITHUB_WORKSPACE}/tmp/buildroot-build
          cp ${GITHUB_WORKSPACE}/swupdate/buildroot.config .config
          
          # Update overlay path to repository location
          sed -i "s|BR2_ROOTFS_OVERLAY=.*|BR2_ROOTFS_OVERLAY=\"${GITHUB_WORKSPACE}/swupdate/buildroot-overlay\"|" .config

      - name: Configure Busybox
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/tmp/buildroot-build/package/busybox
          cp ${GITHUB_WORKSPACE}/swupdate/busybox.config ${GITHUB_WORKSPACE}/tmp/buildroot-build/package/busybox/busybox.config

      - name: Cache Buildroot output
        uses: actions/cache@v4
        id: buildroot-output-cache
        with:
          path: ${GITHUB_WORKSPACE}/tmp/buildroot-build/output
          key: buildroot-output-${{ steps.buildroot-cache-key.outputs.cache_key }}-${{ hashFiles('swupdate/buildroot.config', 'swupdate/busybox.config', 'swupdate/buildroot-overlay/**') }}
          restore-keys: |
            buildroot-output-${{ steps.buildroot-cache-key.outputs.cache_key }}-

      - name: Build Buildroot rootfs
        if: steps.buildroot-output-cache.outputs.cache-hit != 'true'
        run: |
          cd ${GITHUB_WORKSPACE}/tmp/buildroot-build
          make -j$(nproc) 2>&1 | tee build.log
        timeout-minutes: 180

      - name: Generate Kernel cache key
        id: kernel-cache-key
        run: |
          CONFIG_HASH=$(sha256sum ${GITHUB_WORKSPACE}/swupdate/kernel.config | cut -d' ' -f1)
          echo "cache_key=kernel-${{ env.KERNEL_VERSION }}-${CONFIG_HASH:0:8}" >> $GITHUB_OUTPUT

      - name: Restore Kernel cache
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: ${GITHUB_WORKSPACE}/tmp/linux-kernel-src
          key: ${{ steps.kernel-cache-key.outputs.cache_key }}
          restore-keys: |
            kernel-${{ env.KERNEL_VERSION }}-

      - name: Download Linux kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          cd ${GITHUB_WORKSPACE}/tmp
          wget https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git/snapshot/linux-${KERNEL_VERSION}.y.tar.gz
          tar -xzf linux-${KERNEL_VERSION}.y.tar.gz
          mkdir -p linux-kernel-src
          mv linux-${KERNEL_VERSION}.y/* linux-kernel-src/
          rm -rf linux-${KERNEL_VERSION}.y linux-${KERNEL_VERSION}.y.tar.gz

      - name: Apply kernel patches
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/tmp/linux-kernel-src
          cd ${GITHUB_WORKSPACE}/tmp/linux-kernel-src
          for patch in ${GITHUB_WORKSPACE}/kernel_files/*.patch; do
            if [ -f "$patch" ]; then
              # Check if patch already applied
              if ! git apply --check "$patch" 2>/dev/null; then
                git apply "$patch" || patch -p1 < "$patch"
              fi
            fi
          done

      - name: Cache Kernel build output
        uses: actions/cache@v4
        id: kernel-output-cache
        with:
          path: ${GITHUB_WORKSPACE}/tmp/linux-kernel-build
          key: kernel-build-${{ steps.kernel-cache-key.outputs.cache_key }}-${{ hashFiles('swupdate/kernel.config', 'kernel_files/**') }}
          restore-keys: |
            kernel-build-${{ steps.kernel-cache-key.outputs.cache_key }}-

      - name: Prepare kernel build directory
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/tmp/linux-kernel-build
          if [ ! -f ${GITHUB_WORKSPACE}/tmp/linux-kernel-build/.config ]; then
            cp ${GITHUB_WORKSPACE}/tmp/linux-kernel-src/* ${GITHUB_WORKSPACE}/tmp/linux-kernel-build/ -r
            cp ${GITHUB_WORKSPACE}/swupdate/kernel.config ${GITHUB_WORKSPACE}/tmp/linux-kernel-build/.config
          fi

      - name: Build kernel
        if: steps.kernel-output-cache.outputs.cache-hit != 'true'
        run: |
          cd ${GITHUB_WORKSPACE}/tmp/linux-kernel-build
          
          # Build kernel with cross-compiler
          ARCH=$ARCH \
          CROSS_COMPILE=$CROSS_COMPILE \
          make -j$(nproc) zImage dtbs 2>&1 | tee kernel-build.log
        timeout-minutes: 120

  create_image:
    needs: build_buildroot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    
      - name: Restore Buildroot and Kernel cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/tmp/buildroot-build
            ${{ github.workspace }}/tmp/linux-kernel-build
          key: buildroot-output-${{ needs.build_buildroot.outputs.cache_key }} # Use your specific keys
    
      - name: Prepare build artifacts
        run: |
          mkdir -p ${{ github.workspace }}/build/itb
          
          # Use the explicit paths where you actually built the components
          # 1. Copy Rootfs
          cp ${GITHUB_WORKSPACE}/tmp/buildroot-build/output/images/rootfs.cpio.xz ${{ github.workspace }}/build/itb/ || \
          cp ${GITHUB_WORKSPACE}/tmp/buildroot-build/output/images/rootfs.cpio ${{ github.workspace }}/build/itb/
          
          # 2. Copy Kernel (Match the path from the 'Build kernel' step)
          cp ${GITHUB_WORKSPACE}/tmp/linux-kernel-build/arch/arm/boot/zImage ${{ github.workspace }}/build/itb/
          
          # 3. Copy DTB
          cp ${GITHUB_WORKSPACE}/tmp/linux-kernel-build/arch/arm/boot/dts/sun5i-r8-chip.dtb ${{ github.workspace }}/build/itb/ || \
          find ${GITHUB_WORKSPACE}/tmp/linux-kernel-build/arch/arm/boot/dts -name "*.dtb" -exec cp {} ${{ github.workspace }}/build/itb/ \;
          
          # Verify files exist before moving to next step
          ls -lh ${{ github.workspace }}/build/itb/

      - name: Create ITB image
        run: |
          cd ${{ github.workspace }}/build/itb

          
          # Log spec for itb image generation
          echo "swupdate.its contents:"
          cat ${GITHUB_WORKSPACE}/swupdate/swupdate.its

          echo "Current directory: $PWD"
          echo "Checking files required for image generation:"
          ls -l .
          ls -l ./zImage ./sun5i-r8-chip.dtb ./rootfs.cpio.xz

          # 2. Copy the .its file here so relative paths (/incbin/) work correctly
          cp ${GITHUB_WORKSPACE}/swupdate/swupdate.its .
          
          # Generate ITB from its specification
          mkimage -f swupdate.its swupdate.itb
                    
          ls -lh swupdate.itb
          mv swupdate.itb ../ || true

      - name: Create output directory
        run: |
          mkdir -p ${{ github.workspace }}/output
          cp ${{ github.workspace }}/build/*.itb ${{ github.workspace }}/output/ || true
          cp ${{ github.workspace }}/build/*.swu ${{ github.workspace }}/output/ || true
          ls -lh ${{ github.workspace }}/output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swupdate-images-${{ github.run_number }}
          path: ${{ github.workspace }}/output/
          retention-days: 30
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ github.workspace }}/output/*.itb
            ${{ github.workspace }}/output/*.swu
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            ${GITHUB_WORKSPACE}/tmp/buildroot-build/build.log
            ${GITHUB_WORKSPACE}/tmp/linux-kernel-build/kernel-build.log
          retention-days: 7
